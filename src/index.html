<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon API</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-grey-200 min-h-screen flex items-center justify-center p-4 font-sans border-red-600">

    <!-- Main Mobile Container -->
    <div class="bg-red-500 w-full max-w-sm border-2 border-gray-800 shadow-2xl flex flex-col p-4 relative">

        <!-- Top Input Box -->
        <input 
            id="PkmInput" 
            type="text" 
            placeholder="PKM Input" 
            class="w-3/4 mx-auto p-2 text-center border-2 border-gray-800 bg-white font-medium focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
        >

        <!-- Image Container -->
        <div id="ImgContainer" class="w-full aspect-square border-2 border-gray-800 bg-white mt-4 flex items-center justify-center overflow-hidden">
            <!-- Optional placeholder text if the image is empty -->
            <span class="text-gray-400 absolute tracking-widest pointer-events-none">PKM Picture</span>
            <img id="PkmImg" class="w-full h-full object-contain relative z-10" alt="">
        </div>

        <!-- Data Container -->
        <div id="CurrentTb" class="w-full border-2 border-gray-800 bg-white mt-4 p-4 flex flex-col items-center gap-3">
            
            <!-- Name -->
            <div class="border-2 border-gray-800 px-4 py-1 text-center min-w-[60%]">
                <span class="text-xs text-gray-500 block uppercase">Name</span>
                <span id="PkmName" class="font-bold text-lg"></span>
            </div>

            <!-- Type -->
            <div class="border-2 border-gray-800 px-4 py-1 text-center min-w-[50%]">
                <span class="text-xs text-gray-500 block uppercase">Type</span>
                <span id="PkmType" class="font-semibold"></span>
            </div>

            <!-- Forms -->
            <div class="border-2 border-gray-800 px-4 py-1 text-center min-w-[50%]">
                <span class="text-xs text-gray-500 block uppercase">Evolutions</span>
                <span id="PkmEvos" class="font-semibold"></span>
            </div>

            <!-- Height and Weight -->
            <div class="flex justify-center gap-2 w-full">
                <div class="border-2 border-gray-800 px-2 py-1 text-center w-[40%]">
                    <span class="text-xs text-gray-500 block uppercase border-b border-gray-300 mb-1">Height</span>
                    <span id="PkmHeight" class="font-semibold"></span>
                </div>
                <div class="border-2 border-gray-800 px-2 py-1 text-center w-[40%]">
                    <span class="text-xs text-gray-500 block uppercase border-b border-gray-300 mb-1">Weight</span>
                    <span id="PkmWeight" class="font-semibold"></span>
                </div>
            </div>

            <!-- Abilities -->
            <div class="border-2 border-gray-800 px-4 py-1 text-center min-w-[60%]">
                <span class="text-xs text-gray-500 block uppercase">Ability(s)</span>
                <span id="PkmAbility" class="font-semibold"></span>
            </div>

        </div>

        <!-- Return Button -->
        <button class="mt-6 mx-auto border-2 border-gray-800 bg-white px-8 py-2 text-2xl font-medium tracking-wide hover:bg-primary hover:text-white transition-colors cursor-pointer active:scale-95">
            Return
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
